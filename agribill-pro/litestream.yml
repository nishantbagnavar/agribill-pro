dbs:
  - path: ./backend/data/agribill.db
    replicas:
      - type: s3
        bucket: ${R2_BUCKET}
        path: agribill-db
        endpoint: ${R2_ENDPOINT}
        access-key-id: ${R2_ACCESS_KEY_ID}
        secret-access-key: ${R2_SECRET_ACCESS_KEY}
        region: auto
        sync-interval: 10s
        snapshot-interval: 1h
        retention: 72h
